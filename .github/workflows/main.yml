name: build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build release APKs
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease -PIS_SO_BUILD=false

      # ── 签名 arm64-v8a ────────────────────────────────────────────
      - name: Sign arm64-v8a APK
        id: sign_arm64
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ALIAS_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"
          INPUT_RELEASEFILE: app/build/outputs/apk/release/mytv-*-arm64-v8a.apk

      # ── 签名 armeabi-v7a ──────────────────────────────────────────
      - name: Sign armeabi-v7a APK
        id: sign_arm32
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ALIAS_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"
          INPUT_RELEASEFILE: app/build/outputs/apk/release/mytv-*-armeabi-v7a.apk

      # ── 签名 x86_64 ───────────────────────────────────────────────
      - name: Sign x86_64 APK
        id: sign_x86_64
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ALIAS_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"
          INPUT_RELEASEFILE: app/build/outputs/apk/release/mytv-*-x86_64.apk

      # ── 签名 x86 ─────────────────────────────────────────────────
      - name: Sign x86 APK
        id: sign_x86
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ALIAS_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"
          INPUT_RELEASEFILE: app/build/outputs/apk/release/mytv-*-x86.apk

      # ── 找到签名后的文件路径 ──────────────────────────────────────
      - name: Locate signed APKs
        id: locate
        run: |
          ARM64=$(ls app/build/outputs/apk/release/*arm64-v8a*-signed.apk 2>/dev/null | head -1)
          ARM32=$(ls app/build/outputs/apk/release/*armeabi-v7a*-signed.apk 2>/dev/null | head -1)
          X86_64=$(ls app/build/outputs/apk/release/*x86_64*-signed.apk 2>/dev/null | head -1)
          X86=$(ls app/build/outputs/apk/release/*x86*-signed.apk 2>/dev/null | grep -v x86_64 | head -1)
          echo "arm64=$ARM64" >> $GITHUB_OUTPUT
          echo "arm32=$ARM32" >> $GITHUB_OUTPUT
          echo "x86_64=$X86_64" >> $GITHUB_OUTPUT
          echo "x86=$X86" >> $GITHUB_OUTPUT
          echo "arm64 apk: $ARM64"
          echo "arm32 apk: $ARM32"
          echo "x86_64 apk: $X86_64"
          echo "x86 apk: $X86"

      - name: Get History
        id: get_history
        run: |
          chmod +x history.sh
          ./history.sh > history.md

      # ── 创建 Release ──────────────────────────────────────────────
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v1.0.1
          release_name: my-tv v1.0.1
          draft: false
          prerelease: false
          body_path: history.md

      # ── 上传 arm64-v8a ────────────────────────────────────────────
      - name: Upload arm64-v8a APK
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.locate.outputs.arm64 }}
          asset_name: my-tv-arm64-v8a.apk
          asset_content_type: application/vnd.android.package-archive

      # ── 上传 armeabi-v7a ──────────────────────────────────────────
      - name: Upload armeabi-v7a APK
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.locate.outputs.arm32 }}
          asset_name: my-tv-armeabi-v7a.apk
          asset_content_type: application/vnd.android.package-archive

      # ── 上传 x86_64 ───────────────────────────────────────────────
      - name: Upload x86_64 APK
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.locate.outputs.x86_64 }}
          asset_name: my-tv-x86_64.apk
          asset_content_type: application/vnd.android.package-archive

      # ── 上传 x86 ─────────────────────────────────────────────────
      - name: Upload x86 APK
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.locate.outputs.x86 }}
          asset_name: my-tv-x86.apk
          asset_content_type: application/vnd.android.package-archive
